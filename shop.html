<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JA Digital Solutions - Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=600;700;800&family=Raleway:wght=400;500;600&family=Roboto:wght=400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1E293B',
            accent: '#38BDF8',
            neutralBg: '#F1F5F9',
          },
          fontFamily: {
            sans: ['Roboto', 'sans-serif'],
            poppins: ['Poppins', 'sans-serif'],
            raleway: ['Raleway', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @keyframes zoomOut {
      0% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .animate-zoom-out {
      animation: zoomOut 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    #mobile-menu {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease-in-out;
    }
    #mobile-menu.open {
      max-height: 200px;
    }
  </style>
</head>
<body class="bg-neutralBg text-primary font-sans antialiased min-h-screen flex flex-col">

  <header class="sticky top-0 z-50 bg-primary/95 backdrop-blur-md shadow-md transition-all duration-300">
    <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="font-poppins font-bold text-white text-xl tracking-wide flex items-center gap-2">
        <span class="text-accent"><i class="fa-solid fa-cubes"></i></span> JA Digital
      </a>
      
      <div class="hidden md:flex items-center space-x-8 font-raleway font-medium text-sm">
        <a href="index.html" class="text-white/90 hover:text-accent transition-colors duration-200">Home</a>
        <a href="about.html" class="text-white/90 hover:text-accent transition-colors duration-200">About Us</a>
        <a href="contact.html" class="text-white/90 hover:text-accent transition-colors duration-200">Contact Us</a>
      </div>

      <button id="menu-btn" class="md:hidden text-white focus:outline-none text-2xl" aria-label="Toggle Menu">
        <i class="fa-solid fa-bars-staggered"></i>
      </button>
    </nav>
    
    <!-- Added Mobile Menu Container -->
    <div id="mobile-menu" class="md:hidden bg-primary text-white overflow-hidden">
      <div class="flex flex-col px-6 py-4 space-y-4 font-raleway font-medium text-sm">
        <a href="index.html" class="hover:text-accent">Home</a>
        <a href="about.html" class="hover:text-accent">About Us</a>
        <a href="contact.html" class="hover:text-accent">Contact Us</a>
      </div>
    </div>
  </header>

  <!-- Rest of your existing content remains exactly the same below -->
  <div class="relative w-full h-[45vh] md:h-[60vh] overflow-hidden bg-white">
    <img src="static/shop.png" alt="Shop Banner" class="w-full h-full object-cover animate-zoom-out opacity-100">
  </div>

  <!-- ... [Remainder of your original HTML code] ... -->

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ once: true });
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('open');
      menuBtn.innerHTML = mobileMenu.classList.contains('open') ? '<i class="fa-solid fa-xmark"></i>' : '<i class="fa-solid fa-bars-staggered"></i>';
    });
  </script>
</body>
</html>
