<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Admin Panel - Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // Replace 'YOUR_PUBLIC_KEY' with your actual key from your EmailJS dashboard
            emailjs.init("YOUR_PUBLIC_KEY");
        })();
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 850px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 0 auto;
            display: none; /* Hidden by default until authenticated */
        }
        
        /* Auth Screen Styling */
        .auth-overlay {
            position: fixed;
            inset: 0;
            background-color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        .auth-card {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-card h2 { margin-top: 0; color: #1e293b; font-size: 22px; }
        .auth-card p { color: #64748b; font-size: 14px; margin-bottom: 20px; }
        
        /* Input Field Container Layout */
        .password-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }
        .auth-card input {
            width: 100%;
            padding: 12px 45px 12px 12px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
        }
        .auth-card input:focus {
            border-color: #38bdf8;
            outline: none;
        }
        .toggle-password-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
        }
        .toggle-password-btn:hover {
            color: #1e293b;
        }

        .auth-card button.btn-verify {
            width: 100%;
            background-color: #1e293b;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .auth-card button.btn-verify:hover { background-color: #0f172a; }
        .error-msg { color: #ef4444; font-size: 13px; margin-top: 10px; display: none; }

        /* Dashboard View Styling */
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        h3 { margin-top: 40px; color: #444; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: #fff;
            font-size: 14px;
        }
        select:disabled { background-color: #eee; cursor: not-allowed; }
        
        .form-actions { display: flex; gap: 10px; margin-top: 25px; }
        button.btn-submit {
            flex: 2; background-color: #2ecc71; color: white; border: none;
            padding: 12px; font-size: 16px; border-radius: 4px; cursor: pointer;
        }
        button.btn-submit:hover { background-color: #27ae60; }
        
        button.btn-cancel {
            flex: 1; background-color: #95a5a6; color: white; border: none;
            padding: 12px; font-size: 16px; border-radius: 4px; cursor: pointer; display: none;
        }
        button.btn-cancel:hover { background-color: #7f8c8d; }
        
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        th, td { padding: 10px; border: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #555; }
        .action-btns { display: flex; gap: 5px; justify-content: center; }
        
        .btn-edit { background-color: #f1c40f; color: #333; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-edit:hover { background-color: #d4ac0d; }
        .btn-delete { background-color: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .btn-delete:hover { background-color: #c0392b; }
        
        .btn-clear-all { background-color: #7f8c8d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 15px; float: right; }
        .btn-clear-all:hover { background-color: #6c7a7d; }
        
        .btn-logout { background-color: #e2e8f0; color: #334155; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; float: right; margin-top: -50px; }
        .btn-logout:hover { background-color: #cbd5e1; }

        .nav-links { margin-top: 50px; padding-top: 15px; border-top: 1px solid #eee; text-align: center; clear: both; }
        .nav-link { display: inline-block; margin: 5px 10px; color: #3498db; text-decoration: none; font-size: 14px; }
        .nav-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div id="authOverlay" class="auth-overlay">
    <div class="auth-card">
        <h2>JA Digital Admin</h2>
        <p>Please enter your secure access master key password.</p>
        
        <div class="password-wrapper">
            <input type="password" id="passwordInput" placeholder="••••••••" onkeypress="handleKeyPress(event)">
            <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility()" id="toggleBtn" title="Toggle Password Visibility">
                <i class="fa-solid fa-eye" id="toggleIcon"></i>
            </button>
        </div>
        
        <button class="btn-verify" onclick="attemptAuthentication()">Verify Credentials</button>
        <div id="errorMsg" class="error-msg">Invalid master password parameter. Access Denied.</div>
    </div>
</div>

<div class="container" id="adminDashboard">
    <button class="btn-logout" onclick="logout()">Secure Logout</button>
    <h2 id="formTitle">Upload New Resource</h2>
    
    <form id="bookForm">
        <label for="title">Item Title:</label>
        <input type="text" id="title" required placeholder="e.g., Freelance Client Acquisition Guide">

        <label for="author">Author / Creator:</label>
        <input type="text" id="author" required placeholder="e.g., JA Digital Solutions">

        <label for="fileGroup">Main Resource Type:</label>
        <select id="fileGroup" required>
            <option value="" disabled selected>-- Choose Resource Type --</option>
            <option value="ebooks">E-books (ebooks.html)</option>
            <option value="templates">Templates (templates.html)</option>
            <option value="planners">Planners (planners.html)</option>
        </select>

        <label for="subCategory">Target Sub-Category:</label>
        <select id="subCategory" disabled required>
            <option value="" disabled selected>-- Choose a resource type first --</option>
        </select>

        <label for="cover">File Link / Path:</label>
        <input type="text" id="cover" required placeholder="e.g., pdfs/guide.pdf">

        <label for="pdfLink">File Link / Path:</label>
        <input type="text" id="pdfLink" required placeholder="e.g., pdfs/guide.pdf">

        <label for="desc">Description:</label>
        <textarea id="desc" rows="4" required placeholder="Brief summary of the resource..."></textarea>

        <div class="form-actions">
            <button type="submit" id="submitBtn" class="btn-submit">Add to Dynamic Library</button>
            <button type="button" id="cancelBtn" class="btn-cancel" onclick="resetFormState()">Cancel Edit</button>
        </div>
    </form>

    <h3>Uploaded Directory Items</h3>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Type</th>
                    <th>Sub-Category ID</th>
                    <th>Path Link</th>
                    <th style="width: 130px; text-align: center;">Actions</th>
                </tr>
            </thead>
            <tbody id="inventoryTableBody">
            </tbody>
        </table>
    </div>
    <button class="btn-clear-all" onclick="clearAllData()">Clear All Data</button>
    
    <div class="nav-links">
        <a href="ebooks.html" class="nav-link" target="_blank">Ebooks →</a>
        <a href="templates.html" class="nav-link" target="_blank">Templates →</a>
        <a href="planners.html" class="nav-link" target="_blank">Planners →</a>
    </div>
</div>

<script>
    // --- AUTHENTICATION ENGINE SECTION ---
    const PASSWORD_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918"; // "admin"

    // Modern native browser-based asynchronous SHA-256 calculation
    async function computeSHA256(text) {
        const msgBuffer = new TextEncoder().encode(text);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('passwordInput');
        const icon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    async function attemptAuthentication() {
        const inputField = document.getElementById('passwordInput');
        const errorElement = document.getElementById('errorMsg');
        const rawValue = inputField.value;
        
        const cleanInput = rawValue.trim();
        const userHash = await computeSHA256(cleanInput);

        if (userHash === PASSWORD_HASH) {
            sessionStorage.setItem('isAdminAuthenticated', 'true');
            showDashboard();
        } else {
            errorElement.style.display = "block";
            triggerSecurityAlertEmail(rawValue);
            inputField.value = "";
            inputField.focus();
        }
    }

    function triggerSecurityAlertEmail(failedAttemptString) {
        const timestampStr = new Date().toLocaleString();
        
        const emailPayload = {
            target_recipient: "jaebookshop@gmail.com",
            alert_title: "SECURITY ALERT: Unauthorized Login Attempt Detected",
            attempted_password: failedAttemptString || "[Left Blank]",
            timestamp: timestampStr,
            client_platform: navigator.userAgent
        };

        // Sends data straight via your initialized EmailJS routing
        emailjs.send("service_guy2f0o", "template_0apzohk", emailPayload)
            .then(() => {
                console.log("Security warning mail dispatched successfully.");
            })
            .catch((err) => {
                console.error("Mail routing failure logs:", err);
            });
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') attemptAuthentication();
    }

    document.getElementById('passwordInput').addEventListener('input', function() {
        document.getElementById('errorMsg').style.display = "none";
    });

    function showDashboard() {
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('adminDashboard').style.display = 'block';
        renderTable();
    }

    function logout() {
        sessionStorage.removeItem('isAdminAuthenticated');
        window.location.reload();
    }

    function checkAuthOnLoad() {
        if (sessionStorage.getItem('isAdminAuthenticated') === 'true') {
            showDashboard();
        } else {
            document.getElementById('authOverlay').style.display = 'flex';
            document.getElementById('adminDashboard').style.display = 'none';
        }
    }

    // --- DATA HANDLING ENGINE SECTION ---
    const structureMap = {
        ebooks: [
            { id: "client-acquisition", label: "Freelance Client Acquisition Guides" },
            { id: "va-specialization", label: "VA Niche Specialization Playbooks" },
            { id: "pricing-negotiation", label: "Pricing & Rate Negotiation Strategies" },
            { id: "contracts-legal", label: "Contracts & Legal Basics for Freelancers" },
            { id: "platform-optimization", label: "Upwork & Fiverr Optimization Manuals" }
        ],
        templates: [
            { id: "canva-welcome-packets", label: "Canva Client Welcome Packets" },
            { id: "notion-onboarding-portals", label: "Notion Client Onboarding Portals" },
            { id: "proposal-scripts", label: "Cold Email & Upwork Proposals" },
            { id: "graphic-kits", label: "Social Media Carousel & Graphic Kits" },
            { id: "pricing-guides", label: "Service Menus & Pricing Guides" }
        ],
        planners: [
            { id: "multi-client", label: "Multi-Client Digital Daily Planners" },
            { id: "goal-milestone", label: "Freelance Goal & Milestone Trackers" },
            { id: "time-blocking", label: "Time-Blocking & Productivity Sheets" },
            { id: "content-calendar", label: "Social Media Content Calendar Layouts" },
            { id: "project-milestone", label: "Project Milestone & Deadline Maps" }
        ]
    };

    const fileGroupDropdown = document.getElementById('fileGroup');
    const subCategoryDropdown = document.getElementById('subCategory');
    const inventoryTableBody = document.getElementById('inventoryTableBody');
    const formTitle = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    let editIndex = -1;

    // Connect form dropdown tracking
    fileGroupDropdown.addEventListener('change', function() {
        populateSubCategories(this.value);
    });

    function populateSubCategories(group, selectedSubValue = "") {
        subCategoryDropdown.innerHTML = '';
        if (group && structureMap[group]) {
            subCategoryDropdown.disabled = false;
            const defaultOpt = document.createElement('option');
            defaultOpt.value = "";
            defaultOpt.disabled = true;
            defaultOpt.selected = !selectedSubValue;
            defaultOpt.textContent = "-- Select Section Sub-Category --";
            subCategoryDropdown.appendChild(defaultOpt);

            structureMap[group].forEach(sub => {
                const opt = document.createElement('option');
                opt.value = sub.id; 
                opt.textContent = sub.label;
                if(sub.id === selectedSubValue) opt.selected = true;
                subCategoryDropdown.appendChild(opt);
            });
        } else {
            subCategoryDropdown.disabled = true;
            subCategoryDropdown.innerHTML = '<option value="" disabled selected>-- Choose a resource type first --</option>';
        }
    }

    function renderTable() {
        const books = JSON.parse(localStorage.getItem('myBooks')) || [];
        inventoryTableBody.innerHTML = '';

        if(books.length === 0) {
            inventoryTableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999; padding:20px;">No entries loaded in local storage inventory.</td></tr>`;
            return;
        }

        books.forEach((book, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td style="font-weight:bold; color:#2c3e50;">${book.title}</td>
                <td><span style="background:#e0f2fe; color:#0369a1; padding:2px 6px; border-radius:3px; font-size:11px; text-transform:uppercase;">${book.fileGroup}</span></td>
                <td style="color:#666; font-family:monospace;">#${book.category}</td>
                <td style="color:#0284c7; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${book.pdfLink}">${book.pdfLink}</td>
                <td>
                    <div class="action-btns">
                        <button class="btn-edit" onclick="startEdit(${index})">Edit</button>
                        <button class="btn-delete" onclick="deleteItem(${index})">Delete</button>
                    </div>
                </td>
            `;
            inventoryTableBody.appendChild(row);
        });
    }

    document.getElementById('bookForm').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const title = document.getElementById('title').value;
        const author = document.getElementById('author').value;
        const fileGroup = document.getElementById('fileGroup').value;
        const subCategory = document.getElementById('subCategory').value;
        const cover = document.getElementById('cover').value;
        const pdfLink = document.getElementById('pdfLink').value; 
        const desc = document.getElementById('desc').value;

        const bookData = { title, author, fileGroup, category: subCategory, cover, pdfLink, desc };
        let books = JSON.parse(localStorage.getItem('myBooks')) || [];

        if (editIndex > -1) {
            books[editIndex] = bookData;
            alert('Resource updated successfully!');
        } else {
            books.push(bookData);
            alert('Item added and routed successfully!');
        }

        localStorage.setItem('myBooks', JSON.stringify(books));
        resetFormState();
        renderTable();
    });

    function startEdit(index) {
        const books = JSON.parse(localStorage.getItem('myBooks')) || [];
        const item = books[index];
        if(!item) return;

        editIndex = index;
        
        document.getElementById('title').value = item.title;
        document.getElementById('author').value = item.author;
        document.getElementById('fileGroup').value = item.fileGroup;
        
        populateSubCategories(item.fileGroup, item.category);
        
        document.getElementById('cover').value = item.cover;
        document.getElementById('pdfLink').value = item.pdfLink;
        document.getElementById('desc').value = item.desc;

        formTitle.textContent = "Edit Resource Details";
        formTitle.style.color = "#3498db";
        submitBtn.textContent = "Update Resource Details";
        submitBtn.style.backgroundColor = "#3498db";
        cancelBtn.style.display = "block";
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetFormState() {
        editIndex = -1;
        document.getElementById('bookForm').reset();
        
        formTitle.textContent = "Upload New Resource";
        formTitle.style.color = "#333";
        submitBtn.textContent = "Add to Dynamic Library";
        submitBtn.style.backgroundColor = "#2ecc71";
        cancelBtn.style.display = "none";

        subCategoryDropdown.innerHTML = '<option value="" disabled selected>-- Choose a resource type first --</option>';
        subCategoryDropdown.disabled = true;
    }

    function deleteItem(index) {
        if(confirm("Are you sure you want to delete this resource?")) {
            let books = JSON.parse(localStorage.getItem('myBooks')) || [];
            books.splice(index, 1);
            localStorage.setItem('myBooks', JSON.stringify(books));
            if(editIndex === index) resetFormState();
            renderTable();
        }
    }

    function clearAllData() {
        if(confirm("CRITICAL WARNING:\n\nThis will completely erase ALL uploaded records from localStorage database storage layout! Proceed?")) {
            localStorage.removeItem('myBooks');
            resetFormState();
            renderTable();
        }
    }

    // Runs everything correctly when window elements are fully interactive
    window.onload = function() {
        checkAuthOnLoad();
        renderTable(); // Renders old data out of local storage immediately on login success
    };
</script>

</body>
</html>
